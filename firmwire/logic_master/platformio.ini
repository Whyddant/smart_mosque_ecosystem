; PlatformIO Project Configuration File
;
; Smart Mosque Ecosystem - Logic Master
; Board: ESP32-S3 N16R8 IoT Logger RS485 Plus
; Role: System coordinator, heartbeat sender, Modbus RTU master
;
; Hardware:
;   - RS485 : TX2=GPIO15, RX2=GPIO16 (onboard auto DE/RE)
;   - RTC   : DS3231M I2C (SDA=GPIO8, SCL=GPIO9)
;   - SD    : MicroSD SPI (SS=10, MOSI=11, SCK=12, MISO=13)
;   - Power : DC 9-24V via onboard MP1584 regulator

[env:esp32-s3-iot-logger]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Serial Monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; Uncomment untuk debugging protocol
    ; -DDEBUG_PROTOCOL

; Dependencies
lib_deps =
    bblanchon/ArduinoJson@^6.21.3

lib_extra_dirs = ../shared

; Upload settings
upload_speed = 921600

; File system
board_build.filesystem = littlefs
board_build.partitions = default.csv
