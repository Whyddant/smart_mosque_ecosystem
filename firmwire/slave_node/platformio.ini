; PlatformIO Project Configuration File
;
; Smart Mosque Ecosystem - Slave Node
;
; NODE KIPAS:
;   Board  : HwThinker 4-relay ESP32 (ESP32 WROOM-32)
;   Relay  : GPIO23(swing), GPIO5(low), GPIO4(med), GPIO13(high)
;   RS485  : TX=GPIO19, RX=GPIO18 (ModBUS TX/RX on board label)
;   LED    : GPIO15
;   Input  : GPIO25, GPIO26, GPIO27, GPIO33
;
; NODE LAMPU & SOUND:
;   Board  : Modbus RTU RS485 Relay 8Ch (dikontrol oleh Logic Master)
;   Tidak ada ESP32 di node ini — relay dikontrol via Modbus RTU
;   Logic Master mengirim perintah Modbus FC05/FC0F ke modul ini

[env:slave-kipas]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    bblanchon/ArduinoJson @ ^6.21.3

lib_extra_dirs = ../shared

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DPROFILE_FAN_4CH_BUILD

; [env:slave-sensor]
; Sensor SHT20 XY-MD02 tidak butuh firmware sendiri.
; Sensor ini langsung dikontrol oleh Logic Master via Modbus RTU RS485.
